# systemd tmpfiles.d rule for labelwatch-lock-watcher bundle retention
# Install to: /etc/tmpfiles.d/labelwatch-lock-traces.conf
#
# Keeps /var/log/labelwatch-lock-traces present and prunes bundle dirs
# older than 14 days. systemd-tmpfiles runs this daily.
#
# Fields: type path mode uid gid age argument
#   d = create dir if missing, apply age to contents (recursive)
#   14d = remove entries older than 14 days
d /var/log/labelwatch-lock-traces 0755 root root 14d -
